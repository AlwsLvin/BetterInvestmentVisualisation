<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" />
    <title>BetterInvestDecision</title>
    <script>
      // Prevent flash of wrong theme: resolve before React loads.
      (function () {
        try {
          var raw = localStorage.getItem('bv-theme');
          var mode = 'auto';
          if (raw) {
            var parsed = JSON.parse(raw);
            mode = (parsed && parsed.state && parsed.state.mode) || 'auto';
          }
          var resolved = mode;
          if (mode === 'auto') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          if (resolved === 'light') document.documentElement.classList.add('light');
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="bg-bg text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
